<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>粒子玫瑰 | 永不凋零</title>
  <style>
    * { margin: 0; padding: 0; }
    body {
      background: #000;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Microsoft YaHei', sans-serif;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }
    .title {
      color: #ff9ec5;
      text-align: center;
      z-index: 2;
      font-size: 1.2rem;
      text-shadow: 0 0 10px rgba(255, 158, 197, 0.7);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="title">送你一场永不散场的玫瑰雨 🌹</div>
  <canvas id="roseCanvas"></canvas>

  <script>
    const canvas = document.getElementById('roseCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 粒子类
    class Petal {
      constructor() {
        this.reset();
      }

      reset() {
        // 从中心点附近生成
        const angle = Math.random() * Math.PI * 2;
        const radius = Math.random() * 30;
        this.x = canvas.width / 2 + Math.cos(angle) * radius;
        this.y = canvas.height / 2 + Math.sin(angle) * radius;

        // 初始速度：向外+向下
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = -Math.random() * 3 - 1; // 向上爆发后下落

        this.size = Math.random() * 4 + 2;
        this.alpha = Math.random() * 0.6 + 0.3;
        this.life = 1.0; // 生命周期 (1.0 → 0.0)
        this.decay = Math.random() * 0.005 + 0.002;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotateSpeed = (Math.random() - 0.5) * 0.05;
      }

      update() {
        this.vy += 0.05; // 重力
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        this.alpha = this.life * (Math.random() * 0.6 + 0.3);
        this.rotation += this.rotateSpeed;

        // 如果生命结束或飞出屏幕，重置
        if (this.life <= 0 || this.y > canvas.height + 50) {
          this.reset();
        }
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);

        // 画一个粉色心形/花瓣（简化）
        ctx.fillStyle = '#ff3366';
        ctx.beginPath();
        ctx.arc(0, 0, this.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    // 创建粒子池
    const petals = [];
    const count = 300; // 粒子数量
    for (let i = 0; i < count; i++) {
      petals.push(new Petal());
    }

    // 动画循环
    function animate() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height); // 轻微拖尾效果

      petals.forEach(petal => {
        petal.update();
        petal.draw();
      });

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
